  <main class="container">
    <h1>Contact</h1>
    <p class="muted">For training inquiries, collaborations, or to talk cricket and playlists—drop a note.</p>

    <div class="card">
      <form>
        <div class="grid two">
          <div>
            <label>Name</label>
            <input type="text" placeholder="Your name" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px">
          </div>
          <div>
            <label>Email</label>
            <input type="email" placeholder="you@example.com" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px">
          </div>
        </div>
        <div style="margin-top:12px">
          <label>Message</label>
          <textarea rows="6" placeholder="How can I help?" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px"></textarea>
        </div>
        <button type="button" style="margin-top:12px;background:var(--accent);color:#fff;border:none;padding:10px 16px;border-radius:10px">Send (placeholder)</button>
      </form>
    </div>
  </main>
